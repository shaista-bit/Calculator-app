<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Calculator</title>
    <link rel="stylesheet" href="index.css">
</head>

<body>
    <h1 class="text-center">Hi,I am a Calculator. <br> Calculate Me!</h1>
    <div class="container border-color text-center bg text-center flex flex-col item-center mx-auto m-w-20 ">
        <div class="row ">
            <input id="input" class='border-color ' type="text" placeholder="0">
        </div>
        <div class="row">
            <button class="operator ">AC</button>
            <button class="operator ">DEL</button>
            <button class="operator">%</button>
            <button class="operator">/</button>
        </div>
        <div class="row">
            <button>1</button>
            <button>2</button>
            <button>3</button>
            <button class="operator">-</button>
        </div>
        <div class="row">
            <button>4</button>
            <button>5</button>
            <button>6</button>
            <button class="operator">+</button>
        </div>
        <div class="row">
            <button>7</button>
            <button>8</button>
            <button>9</button>
            <button class="operator">*</button>
        </div>
        <div class="row">
            <button id="btn" >0</button>
            <button >.</button>
            <button class="operator">=</button>
        </div>
    </div>

    <script src="index.js"></script>
</body>

</html>
